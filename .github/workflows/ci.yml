name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    # Windows required: hardware modules use Windows-only DLLs.
    # Tests that run here are hardware-free (test_config.py only).
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package and test dependencies
        run: |
          pip install -e . --no-deps
          pip install numpy pytest

      - name: Run tests
        run: pytest
